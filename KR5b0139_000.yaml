front:
  text: 太上玄一真人說三途五苦勸戒經道言吾於混沌無形之中歷觀諸天梵氣無鞅數量天地成敗生死報應莫不有對莫不有歸天地運轉四時交謝亦有盛衰日月光耀一滅一生亦有盈虧人禀氣生志有精粗行有是非心願如是形迹亦是功過相籍纎毫不失皆明於天地其理甚分故人死無數生亦不止皆以輪轉魂神往返相加莫非先身以之無極吾故於虛無無形之中為諸來生上開八門以為法輪教化愚蒙勸戒因緣開度萬生令治道行得入無為知其宿命成於至真而今見八門無極世界塵沙而來百姓子男女人學與不學不顧宿命違科犯戒死嬰痛毒流曵三途五苦之中非復人形皆受其前身所行惡對致今之報見之悲傷為之不言責之在形愍之在心今故開法輪以度其身來者明愼詳而奉焉道言吾嘗歷觀諸天出遊東門見有百姓子男女人口面膿爛血臭流出頸如垂線腹如懸鼓身有鐵錐口中銜火大小相牽流曵途炭無復人形足踐刀刃之上身負鐵杖痛不可負毒不可忍為之悲傷哀愍無巳道曰其人何辜宿命何緣所行何犯積何罪過以致斯報苦毒如此東極世界飛天人曰斯罪人也其前身所行惡口赤舌評論道德攻伐師主更相讒擊或殺害無道不念衆生酷虐為行心懷隂惡誅戮無度嫉妬勝己抑絶賢明致招今對諸苦備經萬劫當還生非人之道其因如此道曰可令斯人念其前行思念為善度著法輪授以勸戒使得更生還在人中修吾此道以解宿對思作道行廣開法門建立福田功滿德就升入東門之中見其宿命之根更受滅度以致飛仙也道言吾嘗歷觀諸天出遊西門見有百姓子男女人牛頭獸身拔出其舌以鐵錐刺之巨天力士鐵杖亂考不有限數身體膿壞無復人形足立刀山之上痛不可堪毒不可忍見之悲傷哀之無巳道曰其人何辜緣何宿命行何元逆以致斯報楚毒如此西極世界飛天人曰斯罪人也其人前身所行不道違負師命輕忽三寶口是心非攻根伐主罵詈呪誓呌喚神鬼飲酒過量貪欲無巳或毁善譽惡謗擊賢人諂害忠良滅人之命怨魂彌訴斯罪深重致招今對諸苦備經萬劫當還生邊夷之國有人之形無人之情其因如此道曰可令斯人思其宿行念其所患攺之為善內著法輪授以勸戒使得還生中國修吾此道解其宿對思念作善廣建福田更受開度入吾西門見諸天人受其先功之業永享無量之報也道言吾嘗歷觀諸天出遊南門見有百姓子男女人祼身無衣吞火食炭為火所燒頭面焦燎舉體爛壞無復人形頭戴鐵鑊足倚火山痛非可忍考不可瞻見之悲傷愍之在心道曰其人從何而生生從何來宿命何緣犯何非法而招此對楚毒乃爾南極世界飛天人曰此之罪人前生之時歧咽兩舌評論道士攻擊賢人不慈不孝不仁不忠罵辱父母六親相殘或烹殺六畜殘害獸命炎炙噉食取一時之美不顧宿命或為屠賣割剔無數斯罪元逆致招今對苦痛備更萬劫當還生六畜中以酬昔怨其因如此道曰可令斯人攺往之行思念作善度入法輪得還生人中授其勸戒使行慈心廣建功德更受開度入吾南門得見諸天受善功之福與善結緣也道言吾嘗歷觀諸天出遊北門見有百姓子男女人祼形赤身無大無小相牽流曵入鑊湯之中身被煮漬百毒之汁以灌其上五體爛壞非可得忍然後又入寒泉之池或入北獄之中頸腳鎖械身負考掠幽閉重檻不覩三光道曰此人從何而來生出何門與何結緣犯何神明人雖有對其酷如斯甚可哀傷北極世界飛天人曰此之罪人前生所行手弒君父謀反師主賊害人命或恃强抑弱中傷朋友攻擊善人告語官司橫罹無辜枉者稱訴怨懟彌天或祼露三光穢慢世君或敗壞靜舍靈觀治堂或盜取經書無盟而傳或疑毁正文訾壞寶章或燒敗天經輕慢靈真斯罪深重故招今對萬楚備經萬劫當生六畜之中或為賤人聾盲六疾非人之形其因如此道曰可令斯人思念先行攺心為善內著法輪授以勸戒使得生人道伏從禁戒於今更治道行受於開度入吾北門見其宿命令知至真也道言吾嘗歷觀諸天出遊東北門見有百姓子男女人身形髠截鋃鐺鎖械負山擔石往返鐵針之上食息不得不捨晝夜大小相率無復數量難辛塗炭非可忍視道曰此人緣何而生受生誰門積河罪過犯何神明嬰負斯對乃至如此身充考楚何當得脫東北世界飛天人曰斯罪人也其前生富貴凌虐貧賤强奪人物殺害人命或為劫賊更相攻伐或奪人所愛姦人妻妾離人母子或六親相姦淫犯骨肉斯罪深重致招今對身經三掠乃得還生牛馬之中其因如此道見之悲傷哀念在心告飛天人曰可令斯人思念宿命前身所犯於今改更與善結緣得脫此厄當念作功德廣建福田以贖往愆當授其勸戒度入東北之門令見衆善知其命根轉輪不滅乃可得入無量之場也道言吾嘗歷觀諸天出遊西南門見有百姓子男女人祼形赤身身抱銅柱柱上火針針其腹背太山之獸噉食其肉足立鐵勒之上大小流曵無復人形楚痛塗炭非可忍見道曰斯人何犯宿命何緣行何元逆罪乃至此負考幾年當得解脫西南世界飛天人曰此之罪人前生之時身行强奪人食割乏人命換借不還欺誘萬物或以强凌弱求取無厭得輒歡喜不得忿恨伺便擊人泄其惡心或輕慢尊長笑薄窮病或祼身露形觸忤三光不敬天地不畏鬼神斯罪至重致招今對以報宿怨萬劫當得還生下人之中身作僕使其因如此道見之悲傷哀念無巳告飛天人曰可令斯人思念宿命攺心為善更治道行廣建功德以拔昔怨當授其勸戒度入西南之門令見衆善知有罪福轉輪不滅乃得入無為之道也道言吾嘗歷觀諸天出遊東南門見有百姓子男女人身被髠鉗幽閉重檻不覩三光在五嶽之中一日三掠鐵杖亂考無復數量罪定方謫死魂摙諸山土石填塞河海大小流曵五苦備嬰塗炭難毒非可忍見道曰斯人有何緣對宿命所由犯何神明誰生無罪其獨如此東南世界飛天人曰此之罪人前身殺生淫祀祭飼巫鬼誹笑道士訾毀真人棄法入僞背師叛道呪詛善人被頭散髮仰天呌神厭禱無道輒欲殺人或輕慢日月罵詈星辰自作一法不信宿命或破山塞源斷遏神道或掘人冢槨取人衣物暴露白骨捐放革野笑人作善自言其是嫉妬勝己心懷隂惡其罪深重致招今對萬劫當得還生賤人之中身嬰六極或抱殘病或生業疾以報宿怨其因如此道見之悲傷哀念在心告飛天人曰可令斯人革往之行思念宿命於今修善建立功德度開福田使精誠苦厲以拔昔咎與道結緣度入東南之門授其勸戒令更修善行還生人中學度一切得與道為因也道言吾嘗歷觀諸天出遊西北門見有百姓子男女人身被髠截循上劔𣗳八逹交風吹樹昂下則足履刀山往返無數手足傷爛膿血流出不可得見痛不可忍道曰斯人何辜宿命何值違何經教犯何科律以致斯酷西北世界飛天人曰此之罪人也其前身浮好心慕榮利形賈上學愛惜珍寶不受經法齎信奉受心追吝惜受經未備强欲作師不依年限傳授第子不關天地無有盟約更相傳付得者不恭付者不精唱露祕文流布俗間致令愚俗毁咎道真訾毁寶經或受經穢慢輕忽三寶不承師訓自用一意或齊戒不精思念不專其罪深重致招今對萬劫當得還生下愚之中與道長隔或嬰六疾聾盲不聰其因如此道見之悲傷哀念在心告飛天人曰斯人雖犯科律嘗經法門可令思念先身所行之惡令更思善廣建功德伏從師宗度其西北之門授其勸戒令得還生人中更受寶經勤行大業功滿德普當得升入至真之場也道言吾開八門以遙觀衆生見有百姓子男女人學與不學不顧宿命所行元惡翻天倒地無所不作罪滿結竟死魂充謫三途五苦八難之中考掠楚橽痛毒無極大小流曵相牽塗炭歷劫不解哀念悲傷不能巳矣故為開度授其勸戒令自思善念其宿命所行罪惡於是改行內著法輪令早得更生還於人中大作功德施惠布散廣建福田奉宗師寶供養孝心令功成德滿解拔昔怨身受福慶乃入道場知有宿命以成至真此法弘普功加一切得見其文宿根自拔五苦不經三途解脫長離八難見世安康世世富貴家門興隆思念前生與善因緣若能長齊燒香禮拜廣救萬物功濟衆生損身布施行人所不能行為人所不能為懷人所不能懷忍人所不能忍衆行合法剋得上仙坐降雲龍飛行太空也
