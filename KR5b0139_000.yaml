body:
  text: 三途五苦無善命根偈頌出遊八門歷觀諸天無極世界洞覩諸緣見有百姓男女之人窮魂號咷流曵八難吞火食炭負石摙山循履劔𣗳風刀往還五體爛壞無復形身見之悲哀不覺悲傷問之何辜宿命何緣鍾嬰斯對不識命根迷不知革沈淪罪因念汝歷劫諸苦備更三光長閉幽痛可言望吾八門甚為泯泯妙覺輪化宿命偈頌妙覺來去惠魂神無暫滅一生一死中形魂不蹉跌天地罪福門緣對各歸一熟覺前身行三途永難脫飛天說勸戒輪轉八門出思念宿命根積善以自拔今化生人中始悟運不絶建立開福田廣救加一切功滿德亦普超度無羣匹身享無數數神歡形亦恱放浪隨運遷逍遙無為室顧看罪門臭與爾長離别法輪拔度命根升玄偈頌八觀因緣門罪福從中生時見有心者思悟感天情吾今為爾故開門說妙經如是經中言億劫皆受榮伏從受勸戒以經度我形思念宿命根拔出先身嬰超越過三羅八難於是冥魂返入定質神操從是榮滅度如脫胞曠朗覩八清轉輪得神仙緣我攺心精受報無窮量志定入福庭三十二相好皆從身中明項負七寶光照耀諸天形雲遷八景輿回風捷緑軿升入玄玄門斯慶樂未央道言此三萹偈頌出元始之先無數之劫道成天地功濟萬物其說微妙弘廣無極皆授高仙大聖十方至真巳得仙道不授中仙得見其文供養宗奉生死獲慶不更三途不履八難見世富貴合門安寧世生賢才男女聰明聲色端偉智慧儒仁萬惡消伏千災不干死離地獄不經泰山徑升福堂衣食自然輪轉不滅與善因緑若能長齊修行思真奉法承戒虛心注玄開張廣救拯厄度窮施惠散德供事師宗承顔恱色形同苦寒功滿德就身後神仙逍遙太空升入八門之中也太上玄一真人說三途五苦勸戒經
